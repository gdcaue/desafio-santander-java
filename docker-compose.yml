services:
  postgres:
    image: postgres:16-alpine
    container_name: consulta-cep-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consulta_cep -d consulta_cep"]
      interval: 10s
      timeout: 5s
      retries: 5

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: consulta-cep-wiremock
    ports:
      - "${WIREMOCK_HOST_PORT:-8081}:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command:
      - "--verbose"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
